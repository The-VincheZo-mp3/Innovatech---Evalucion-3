name: CI/CD Innovatech EKS Monorepo

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  ECR_REPO_FRONTEND: innovatech-frontend
  ECR_REPO_BACKEND: innovatech-backend
  EKS_CLUSTER_NAME: innovatech-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & push BACKEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          sed -i 's/RUN .\/mvnw/RUN mvn/g' ./repo_Backend/Dockerfile || true
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPO_BACKEND }}:${{ env.IMAGE_TAG }} ./repo_Backend
          docker push $ECR_REGISTRY/${{ env.ECR_REPO_BACKEND }}:${{ env.IMAGE_TAG }}

      - name: Build & push FRONTEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPO_FRONTEND }}:${{ env.IMAGE_TAG }} ./repo_Frontend
          docker push $ECR_REGISTRY/${{ env.ECR_REPO_FRONTEND }}:${{ env.IMAGE_TAG }}

      - name: Configurar conexión a EKS
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Generar y Aplicar Manifiestos de Kubernetes
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          mkdir -p k8s
          
          # 1. Generar Backend Deployment
          cat <<EOF > k8s/backend-deployment.yaml
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: innovatech-backend
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: innovatech-backend
            template:
              metadata:
                labels:
                  app: innovatech-backend
              spec:
                containers:
                - name: backend-container
                  image: $ECR_REGISTRY/${{ env.ECR_REPO_BACKEND }}:${{ env.IMAGE_TAG }}
                  ports:
                  - containerPort: 8080
          EOF

          # 2. Generar Backend Service
          cat <<EOF > k8s/backend-service.yaml
          apiVersion: v1
          kind: Service
          metadata:
            name: innovatech-backend
          spec:
            type: ClusterIP
            ports:
            - port: 8080
              targetPort: 8080
            selector:
              app: innovatech-backend
          EOF

          # 3. Generar Frontend Deployment
          cat <<EOF > k8s/frontend-deployment.yaml
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: innovatech-frontend
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: innovatech-frontend
            template:
              metadata:
                labels:
                  app: innovatech-frontend
              spec:
                containers:
                - name: frontend-container
                  image: $ECR_REGISTRY/${{ env.ECR_REPO_FRONTEND }}:${{ env.IMAGE_TAG }}
                  ports:
                  - containerPort: 80
          EOF

          # 4. Generar Frontend Service (LoadBalancer para acceso público)
          cat <<EOF > k8s/frontend-service.yaml
          apiVersion: v1
          kind: Service
          metadata:
            name: innovatech-frontend
          spec:
            type: LoadBalancer
            ports:
            - port: 80
              targetPort: 80
            selector:
              app: innovatech-frontend
          EOF

          # Aplicar los manifiestos generados en el clúster
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml

      - name: Verificar estado
        run: |
          echo "=== Esperando que los Pods inicien ==="
          sleep 15
          kubectl get deployments
          kubectl get services
          kubectl get pods
