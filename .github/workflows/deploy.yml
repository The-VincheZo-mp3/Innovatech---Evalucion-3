name: Deploy InnovaTech to Amazon EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: innovatech-cluster
  ECR_REPO_FRONTEND: repo_frontend
  ECR_REPO_BACKEND: repo_backend

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, Tag, and Push Frontend Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/${{ env.ECR_REPO_FRONTEND }}:$IMAGE_TAG ./repo_Frontend
        docker push $ECR_REGISTRY/${{ env.ECR_REPO_FRONTEND }}:$IMAGE_TAG

    - name: Build, Tag, and Push Backend Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/${{ env.ECR_REPO_BACKEND }}:$IMAGE_TAG ./repo_Backend
        docker push $ECR_REGISTRY/${{ env.ECR_REPO_BACKEND }}:$IMAGE_TAG

    - name: Update Kubeconfig for Amazon EKS
      run: |
        aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

    - name: Generate and Apply Kubernetes Manifests
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Crear la carpeta k8s dinámicamente si no existe
        mkdir -p k8s

        # 1. MANIFIESTO BACKEND (Deployment y Service como NodePort)
        cat <<EOF > k8s/backend.yaml
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: innovatech-backend
          namespace: default
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: innovatech-backend
          template:
            metadata:
              labels:
                app: innovatech-backend
            spec:
              containers:
              - name: backend-container
                image: $ECR_REGISTRY/${{ env.ECR_REPO_BACKEND }}:$IMAGE_TAG
                ports:
                - containerPort: 3000
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: innovatech-backend
          namespace: default
        spec:
          type: NodePort
          ports:
            - port: 3000
              targetPort: 3000
              nodePort: 30030
          selector:
            app: innovatech-backend
        EOF

        # 2. MANIFIESTO FRONTEND (Deployment y Service corregido a NodePort para Fargate)
        cat <<EOF > k8s/frontend.yaml
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: innovatech-frontend
          namespace: default
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: innovatech-frontend
          template:
            metadata:
              labels:
                app: innovatech-frontend
            spec:
              containers:
              - name: frontend-container
                image: $ECR_REGISTRY/${{ env.ECR_REPO_FRONTEND }}:$IMAGE_TAG
                ports:
                - containerPort: 80
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: innovatech-frontend
          namespace: default
        spec:
          type: NodePort
          ports:
            - port: 80
              targetPort: 80
              nodePort: 30080
          selector:
            app: innovatech-frontend
        EOF

        # Aplicar configuraciones en Amazon EKS
        kubectl apply -f k8s/backend.yaml
        kubectl apply -f k8s/frontend.yaml

    - name: Verify Cluster Deployment Status
      run: |
        echo "=== Verificando estado de los Pods en Fargate ==="
        kubectl get pods -n default
        echo "=== Verificando estado de los Servicios ==="
        kubectl get svc -n default
